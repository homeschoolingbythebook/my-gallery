<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --text: #111111;
      --text-muted: #888888;
      --accent: #000000;
      --border: #e0e0e0;
      --gap: 6px;
      --radius: 2px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 72px 20px 48px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 10px;
    }

    header p {
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    header .divider {
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin: 20px auto 0;
    }

    /* ── Gallery Grid ── */
    .gallery {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 100px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: var(--gap);
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      cursor: pointer;
      aspect-ratio: 1 / 1;
      background: var(--border);
      animation: fadeIn 0.6s ease both;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  opacity 0.4s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.04);
      opacity: 0.9;
    }

    .gallery-item::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 1px solid rgba(0,0,0,0.04);
      border-radius: var(--radius);
      pointer-events: none;
      transition: border-color 0.3s ease;
    }

    .gallery-item:hover::after {
      border-color: rgba(0,0,0,0.12);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97); }
      to { opacity: 1; transform: scale(1); }
    }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(30px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .lightbox.active {
      opacity: 1;
      visibility: visible;
    }

    .lightbox img {
      max-width: 88vw;
      max-height: 82vh;
      object-fit: contain;
      border-radius: var(--radius);
      box-shadow: 0 8px 60px rgba(0,0,0,0.12);
      transform: scale(0.94);
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .lightbox.active img {
      transform: scale(1);
    }

    .lightbox-close {
      position: absolute;
      top: 28px;
      right: 32px;
      width: 40px;
      height: 40px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--text);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
    }

    .lightbox-close:hover {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--text);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
    }

    .lightbox-nav:hover {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }

    .lightbox-prev { left: 24px; }
    .lightbox-next { right: 24px; }

    .lightbox-counter {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--text-muted);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      font-weight: 300;
    }

    /* ── Loading / Status ── */
    .status {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .status p {
      font-size: 1rem;
      margin-bottom: 12px;
      font-weight: 300;
    }

    .status code {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 3px;
      font-size: 0.85rem;
      color: var(--text);
    }

    .loader {
      width: 24px;
      height: 24px;
      border: 1.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
        gap: 4px;
        padding: 0 8px 60px;
      }
      header { padding: 48px 16px 32px; }
      .lightbox-nav { width: 36px; height: 36px; font-size: 1rem; }
      .lightbox-prev { left: 12px; }
      .lightbox-next { right: 12px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Leigh DeWitt</h1>
    <p>School Year 2025–2026</p>
    <div class="divider"></div>
  </header>

  <div class="gallery" id="gallery">
    <div class="status" id="loading">
      <div class="loader"></div>
      <p>Loading gallery&hellip;</p>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">✕</button>
    <button class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Previous">‹</button>
    <button class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Next">›</button>
    <img src="" alt="" id="lightbox-img">
    <div class="lightbox-counter" id="lightbox-counter"></div>
  </div>

  <script>
    const GITHUB_USER = 'homeschoolingbythebook';
    const GITHUB_REPO = 'my-gallery';

    const IMAGE_EXTENSIONS = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'bmp', 'svg'];
    const gallery = document.getElementById('gallery');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxCounter = document.getElementById('lightbox-counter');
    let currentIndex = 0;
    let images = [];

    async function loadGallery() {
      try {
        const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/images`;
        const response = await fetch(apiUrl);

        if (!response.ok) {
          throw new Error(`Could not load images (${response.status})`);
        }

        const files = await response.json();

        const imageFiles = files.filter(file => {
          const ext = file.name.split('.').pop().toLowerCase();
          return IMAGE_EXTENSIONS.includes(ext);
        }).sort((a, b) => a.name.localeCompare(b.name));

        if (imageFiles.length === 0) {
          gallery.innerHTML = `
            <div class="status">
              <p>No images found yet.</p>
              <p>Upload <code>.jpg</code> or <code>.png</code> files to the <code>images/</code> folder in your repo.</p>
            </div>`;
          return;
        }

        gallery.innerHTML = '';

        imageFiles.forEach((file, index) => {
          const imgUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/images/${file.name}`;
          const name = file.name.replace(/\.[^/.]+$/, '').replace(/[-_]/g, ' ');

          images.push({ src: imgUrl, alt: name });

          const item = document.createElement('div');
          item.className = 'gallery-item';
          item.style.animationDelay = `${index * 0.07}s`;
          item.innerHTML = `<img src="${imgUrl}" alt="${name}" loading="lazy">`;
          item.addEventListener('click', () => openLightbox(index));
          gallery.appendChild(item);
        });

      } catch (err) {
        gallery.innerHTML = `
          <div class="status">
            <p>Couldn't load the gallery.</p>
            <p>Make sure <code>GITHUB_USER</code> and <code>GITHUB_REPO</code> are set correctly in the HTML, and that the repo is public.</p>
            <p style="margin-top: 12px; font-size: 0.85rem;">${err.message}</p>
          </div>`;
      }
    }

    function openLightbox(index) {
      currentIndex = index;
      updateLightbox();
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    function updateLightbox() {
      lightboxImg.src = images[currentIndex].src;
      lightboxImg.alt = images[currentIndex].alt;
      lightboxCounter.textContent = `${currentIndex + 1} / ${images.length}`;
    }

    function navigate(dir) {
      currentIndex = (currentIndex + dir + images.length) % images.length;
      updateLightbox();
    }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox-prev').addEventListener('click', () => navigate(-1));
    document.getElementById('lightbox-next').addEventListener('click', () => navigate(1));

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
    });

    loadGallery();
  </script>

</body>
</html>
