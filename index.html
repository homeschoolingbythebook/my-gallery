<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #1a1a1a;
      --text: #e8e4df;
      --text-muted: #8a8580;
      --accent: #c9a96e;
      --gap: 10px;
      --radius: 4px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 60px 20px 40px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: clamp(2rem, 5vw, 3.2rem);
      letter-spacing: 0.04em;
      color: var(--text);
      margin-bottom: 8px;
    }

    header p {
      color: var(--text-muted);
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Gallery Grid ── */
    .gallery {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 80px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--gap);
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      cursor: pointer;
      aspect-ratio: 1 / 1;
      background: var(--surface);
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  filter 0.4s ease;
      filter: brightness(0.88) saturate(0.95);
    }

    .gallery-item:hover img {
      transform: scale(1.05);
      filter: brightness(1) saturate(1);
    }

    .gallery-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.3) 0%, transparent 40%);
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    .gallery-item:hover::after {
      opacity: 0;
    }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .lightbox.active {
      opacity: 1;
      visibility: visible;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: var(--radius);
      box-shadow: 0 20px 80px rgba(0,0,0,0.6);
      transform: scale(0.92);
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .lightbox.active img {
      transform: scale(1);
    }

    .lightbox-close {
      position: absolute;
      top: 24px;
      right: 28px;
      width: 44px;
      height: 44px;
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      color: var(--text);
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
    }

    .lightbox-close:hover {
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.06);
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      background: none;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50%;
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
    }

    .lightbox-nav:hover {
      border-color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.06);
    }

    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }

    .lightbox-counter {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--text-muted);
      font-size: 0.85rem;
      letter-spacing: 0.15em;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
        gap: 6px;
        padding: 0 8px 60px;
      }
      header { padding: 40px 16px 24px; }
      .lightbox-nav { width: 38px; height: 38px; font-size: 1rem; }
      .lightbox-prev { left: 10px; }
      .lightbox-next { right: 10px; }
    }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty-state p {
      font-size: 1.1rem;
      margin-bottom: 12px;
    }

    .empty-state code {
      background: var(--surface);
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.9rem;
      color: var(--accent);
    }
  </style>
</head>
<body>

  <header>
    <h1>My Gallery</h1>
    <p>A collection of photographs</p>
  </header>

  <div class="gallery" id="gallery">
    <!--
      ╔══════════════════════════════════════════════════════════════╗
      ║  HOW TO ADD IMAGES:                                         ║
      ║                                                             ║
      ║  1. Put your .jpg / .png files in the "images/" folder      ║
      ║  2. Add a line here for each image like this:               ║
      ║                                                             ║
      ║     <div class="gallery-item">                              ║
      ║       <img src="images/your-photo.jpg" alt="Description">   ║
      ║     </div>                                                  ║
      ║                                                             ║
      ║  3. Commit & push — your gallery updates automatically!     ║
      ╚══════════════════════════════════════════════════════════════╝
    -->

    <!-- EXAMPLE ENTRIES (replace these with your own images) -->
    <div class="gallery-item">
      <img src="images/photo1.jpg" alt="Photo 1">
    </div>
    <div class="gallery-item">
      <img src="images/photo2.jpg" alt="Photo 2">
    </div>
    <div class="gallery-item">
      <img src="images/photo3.jpg" alt="Photo 3">
    </div>
    <div class="gallery-item">
      <img src="images/photo4.jpg" alt="Photo 4">
    </div>
    <div class="gallery-item">
      <img src="images/photo5.jpg" alt="Photo 5">
    </div>
    <div class="gallery-item">
      <img src="images/photo6.jpg" alt="Photo 6">
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">✕</button>
    <button class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Previous">‹</button>
    <button class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Next">›</button>
    <img src="" alt="" id="lightbox-img">
    <div class="lightbox-counter" id="lightbox-counter"></div>
  </div>

  <script>
    const galleryItems = document.querySelectorAll('.gallery-item');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxCounter = document.getElementById('lightbox-counter');
    let currentIndex = 0;
    let images = [];

    // Collect all images
    galleryItems.forEach((item, i) => {
      const img = item.querySelector('img');
      images.push({ src: img.src, alt: img.alt });
      item.addEventListener('click', () => openLightbox(i));
    });

    function openLightbox(index) {
      currentIndex = index;
      updateLightbox();
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    function updateLightbox() {
      lightboxImg.src = images[currentIndex].src;
      lightboxImg.alt = images[currentIndex].alt;
      lightboxCounter.textContent = `${currentIndex + 1} / ${images.length}`;
    }

    function navigate(dir) {
      currentIndex = (currentIndex + dir + images.length) % images.length;
      updateLightbox();
    }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox-prev').addEventListener('click', () => navigate(-1));
    document.getElementById('lightbox-next').addEventListener('click', () => navigate(1));

    // Close on backdrop click
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
    });
  </script>

</body>
</html>
